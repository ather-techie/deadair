<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DeadAir — upload</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header id="app-header">
      <div>
        <h1>DeadAir</h1>
        <p class="tagline">Upload a video, cut the silence and filler, get a tighter cut back.</p>
      </div>
      <button id="theme-toggle" type="button" aria-label="Toggle dark mode">
        <span id="theme-toggle-icon" aria-hidden="true">&#9789;</span>
      </button>
    </header>

    <section class="card">
      <form id="upload-form">
        <label for="video">Video file</label>
        <input type="file" id="video" name="video" accept="video/*" required>
        <fieldset id="options">
          <legend>What should we do?</legend>
          <label><input type="checkbox" id="remove-silence" name="remove_silence" checked> Remove silence</label>
          <label><input type="checkbox" id="remove-filler" name="remove_filler" checked> Remove filler words</label>
          <label><input type="checkbox" id="speed-up-cuts" name="speed_up_cuts"> Speed up instead of cut
            <select id="speed-multiplier" name="speed_multiplier">
              <option value="2">2x</option>
              <option value="4" selected>4x</option>
              <option value="8">8x</option>
            </select>
          </label>
          <label><input type="checkbox" id="show-original-transcript" name="show_original_transcript"> Show original transcript</label>
          <label><input type="checkbox" id="show-result-transcript" name="show_result_transcript"> Show result transcript</label>
          <label class="option-disabled"><input type="checkbox" disabled> Generate subtitles <span class="soon-badge">soon</span></label>
          <label class="option-disabled"><input type="checkbox" disabled> Generate chapters <span class="soon-badge">soon</span></label>
        </fieldset>
        <p id="options-error" class="error" hidden>Select at least one option.</p>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Upload</button>
          <button id="reset-btn" class="btn-outline" type="button">Reset</button>
        </div>
      </form>
    </section>

    <section class="card" id="progress-card">
      <p id="status"></p>
      <p id="total-time"></p>
      <ul id="progress"></ul>
      <button id="cancel-btn" class="btn-outline" type="button" hidden>Cancel job</button>
    </section>

    <section class="card" id="compare-card">
      <div id="video-compare">
        <div class="video-pane">
          <h3>Original</h3>
          <div id="original-preview"></div>
        </div>
        <div class="video-pane">
          <h3>Result</h3>
          <div id="result"></div>
        </div>
      </div>
    </section>

    <section class="card" id="transcript-card">
      <div id="original-transcript-content" class="transcript-block" hidden>
        <div class="transcript-header">
          <h3>Original transcript</h3>
          <span class="transcript-badge">Original audio — before cuts</span>
        </div>
        <div id="original-transcript"></div>
      </div>
      <div id="result-transcript-content" class="transcript-block" hidden>
        <div class="transcript-header">
          <h3>Result transcript</h3>
          <span class="transcript-badge">After cuts — original time → result time</span>
        </div>
        <div id="result-transcript"></div>
      </div>
    </section>

    <footer>
      <details id="storage-details" hidden>
        <summary>Storage details</summary>
        <div id="storage-info"></div>
      </details>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
